<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8" />
  <title>{BRAND_NAME}</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato&family=Poppins&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <!--[if mso]>
    <style type="text/css">
      body, table, td { font-family: Arial, sans-serif !important; }
    </style>
  <![endif]-->
  <style type="text/css">
    img { border:0; outline:none; text-decoration:none; }
    table { border-collapse:collapse; }
    a { text-decoration:none; }
  </style>
  </head>
<body style="margin:0; padding:0; background:#F4F4F4; font-family: Poppins, 'Lato', sans-serif;">
  <div style="width:100%; max-width:1000px; margin:0 auto; background:#fff; border-radius:4px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.04);">
    <div style="background:#1A407D; padding:49px 0; text-align:center;">
      <a href="{BRAND_WEBSITE}" target="_blank" rel="noopener">
        <img src="{BRAND_LOGO}" width="270" alt="{BRAND_NAME} logo" style="border:0; display:block; margin:0 auto;">
      </a>
    </div>
    <div style="padding:24px 20px; font-size:14px; font-weight:400; line-height:21px; text-align:left; color:#000;">
      {{BODY}}
    </div>
    <div style="padding:26px 0; background:#E8E8E8; text-align:center;">
      <a href="{SOCIAL_INSTAGRAM}" target="_blank" rel="noopener">
        <img src="https://www.puravankara.com/img/instagram.png" alt="Instagram icon" style="vertical-align:middle;" />
      </a>
      <a href="{SOCIAL_LINKEDIN}" target="_blank" rel="noopener" style="padding:0 24px;">
        <img src="https://www.puravankara.com/img/linkedin.png" alt="LinkedIn icon" style="vertical-align:middle;" />
      </a>
      <a href="{SOCIAL_FACEBOOK}" target="_blank" rel="noopener">
        <img src="https://www.puravankara.com/img/facebook.png" alt="Facebook icon" style="vertical-align:middle;" />
      </a>
      <p style="text-align:center; font-family: Poppins, sans-serif; font-size: 11px; line-height: 16px; margin:12px 0 0 0; color:#000;">
        {COMPANY_ADDRESS}
      </p>
    </div>
  </div>
</body>
</html>
